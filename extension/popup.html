<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 260px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .header { font-weight: bold; font-size: 18px; margin-bottom: 12px; color: #1565C0; text-align: center; }
    .switch-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    
    /* Toggle Switch CSS */
    .switch { position: relative; display: inline-block; width: 40px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #2196F3; }
    input:checked + .slider:before { transform: translateX(16px); }
    
    /* Auth CSS */
    .auth-section { display: flex; flex-direction: column; gap: 8px; }
    input[type="email"], input[type="password"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #1976D2; }
    .btn-secondary { background: #fff; color: #2196F3; border: 1px solid #2196F3; }
    .btn-secondary:hover { background: #e3f2fd; }
    #auth-error { color: red; font-size: 11px; text-align: center; }
    
    #logged-in-section { display: none; flex-direction: column; gap: 8px; text-align: center; }
    #user-email { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div class="header">EduNation AI Tutor</div>
  
  <!-- Toggle State -->
  <div class="switch-container">
    <span style="font-weight: bold;">Enable AI Tutor</span>
    <label class="switch">
      <input type="checkbox" id="toggle-tutor">
      <span class="slider"></span>
    </label>
  </div>
  
  <div style="text-align: center; margin-top: 10px;">
      <button id="notebook-btn" style="width: 100%;">📔 Open My Notebook</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
