<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #f59e0b;
      --orange: #ea580c;
      --grad: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
      --bg: #0c0804;
      --bg2: #160e04;
      --text: rgba(255,255,255,0.92);
      --text-muted: rgba(255,255,255,0.5);
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(245,158,11,0.16);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 0;
      overflow: hidden;
      background-image: radial-gradient(ellipse 120% 60% at 50% -20%, rgba(245,158,11,0.1) 0%, transparent 70%);
    }

    /* ── Header ── */
    .popup-header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid rgba(245,158,11,0.12);
      background: linear-gradient(135deg, rgba(245,158,11,0.14) 0%, rgba(234,88,12,0.08) 100%);
    }
    .popup-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 4px;
    }
    .popup-logo {
      width: 28px; height: 28px;
      background: var(--grad);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 3px 10px rgba(245,158,11,0.4);
      flex-shrink: 0;
    }
    .popup-brand h1 {
      font-size: 16px;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    .popup-version {
      font-size: 10px;
      color: var(--text-muted);
      margin-left: auto;
      font-weight: 500;
      -webkit-text-fill-color: unset;
    }

    /* ── Toggle Row ── */
    .toggle-row {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toggle-label strong {
      font-weight: 700;
      font-size: 13px;
      color: var(--text);
    }
    #status-text {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Toggle Switch ── */
    .switch { position: relative; display: inline-block; width: 40px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.12);
      transition: .3s; border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .slider:before {
      position: absolute; content: "";
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: white; transition: .3s; border-radius: 50%;
    }
    input:checked + .slider { background: linear-gradient(135deg, #f59e0b, #ea580c); border-color: transparent; }
    input:checked + .slider:before { transform: translateX(16px); }

    /* ── Stats Row ── */
    .stats-row {
      display: flex;
      gap: 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .stat-item {
      flex: 1;
      padding: 10px 12px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .stat-item:last-child { border-right: none; }
    .stat-value {
      font-size: 18px;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 3px;
    }
    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* ── Due Banner ── */
    #due-banner {
      display: none;
      margin: 12px 16px 0;
      background: linear-gradient(135deg, rgba(234,88,12,0.3), rgba(245,158,11,0.2));
      border: 1px solid rgba(245,158,11,0.35);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 700;
      color: #fcd34d;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }
    #due-banner:hover {
      background: linear-gradient(135deg, rgba(234,88,12,0.45), rgba(245,158,11,0.3));
      box-shadow: 0 4px 14px rgba(245,158,11,0.2);
    }

    /* ── Buttons ── */
    .btn-row {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--grad);
      color: white;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      font-family: var(--font);
      letter-spacing: 0.01em;
      box-shadow: 0 4px 14px rgba(245,158,11,0.3);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── Settings Section ── */
    .settings-section {
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 12px 16px 14px;
    }
    .settings-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .settings-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    #backend-url-input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 11px;
      font-family: var(--font);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    #backend-url-input:focus { border-color: rgba(245,158,11,0.4); }
    #backend-url-input::placeholder { color: rgba(255,255,255,0.2); }
    #save-url-btn {
      padding: 7px 12px;
      background: rgba(245,158,11,0.18);
      border: 1px solid rgba(245,158,11,0.3);
      color: var(--amber);
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font);
      transition: all 0.15s;
      white-space: nowrap;
    }
    #save-url-btn:hover { background: rgba(245,158,11,0.28); }
    #url-saved-msg {
      font-size: 10px;
      color: #86efac;
      margin-top: 5px;
      display: none;
      font-weight: 600;
    }

    /* ── Footer ── */
    .popup-footer {
      padding: 8px 16px 12px;
      text-align: center;
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      border-top: 1px solid rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="popup-header">
    <div class="popup-brand">
      <div class="popup-logo">📚</div>
      <h1>EduNation AI</h1>
      <span class="popup-version">v2.1</span>
    </div>
  </div>

  <!-- Toggle -->
  <div class="toggle-row">
    <div class="toggle-label">
      <strong>Enable AI Tutor</strong>
      <span id="status-text">Turn on to start tracking lectures.</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle-tutor">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-value" id="stat-notes">—</div>
      <div class="stat-label">Notes</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-videos">—</div>
      <div class="stat-label">Videos</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-due">—</div>
      <div class="stat-label">Due</div>
    </div>
  </div>

  <!-- Due Banner -->
  <div id="due-banner">
    📅 <span id="due-count-text">0 cards due for review</span>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn-primary" id="notebook-btn">📔 Open My Notebook</button>
  </div>

  <!-- Settings -->
  <div class="settings-section">
    <div class="settings-label">⚙️ Backend URL</div>
    <div class="settings-row">
      <input type="text" id="backend-url-input" placeholder="http://localhost:8000" />
      <button id="save-url-btn">Save</button>
    </div>
    <div id="url-saved-msg">✓ Saved — reloading active tab</div>
  </div>

  <div class="popup-footer">All data stored locally on this device</div>

  <script type="module" src="popup.js"></script>
</body>
</html>
